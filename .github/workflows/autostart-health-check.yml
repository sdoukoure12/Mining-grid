name: Mining-Grid Health Check

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Manual trigger
  push:
    branches: [main]
    paths:
      - 'scripts/health-check.sh'
      - '.github/workflows/autostart-health-check.yml'

jobs:
  health-check:
    name: Mining Grid Server Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check server startup
        run: |
          echo "::group::Starting Mining-Grid server for health check"
          # Start the server in background
          PORT=3000 MONGO_URI=mongodb://localhost:27017/mining_grid_test \
            NODE_ENV=test timeout 15 node server.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait for server to start
          echo "Waiting for server to start..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ Server started successfully"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "❌ Server failed to start within 10 seconds"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          echo "::endgroup::"

          echo "::group::Running API health checks"
          # Health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
          echo "Health endpoint status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health endpoint returned $HTTP_STATUS"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          echo "✅ Health endpoint OK"

          # Miners list endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/miners)
          echo "Miners list endpoint status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "503" ]; then
            echo "❌ Miners endpoint returned unexpected status $HTTP_STATUS"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          echo "✅ Miners endpoint OK"

          kill $SERVER_PID 2>/dev/null || true
          echo "::endgroup::"

      - name: Check mining pool connectivity
        run: |
          echo "::group::Mining pool connectivity checks"
          POOLS=(
            "pool.bitcoin.com:3333"
            "stratum.slushpool.com:3333"
            "eu.stratum.slushpool.com:3333"
          )
          FAILURES=0
          for pool in "${POOLS[@]}"; do
            HOST="${pool%%:*}"
            PORT="${pool##*:}"
            if timeout 5 bash -c "echo >/dev/tcp/$HOST/$PORT" 2>/dev/null; then
              echo "✅ Pool $pool reachable"
            else
              echo "⚠️  Pool $pool unreachable (may be normal in CI)"
              FAILURES=$((FAILURES + 1))
            fi
          done
          # Warn but don't fail – pools may be blocked in CI
          if [ $FAILURES -gt 0 ]; then
            echo "::warning::$FAILURES mining pool(s) were unreachable – check connectivity in production"
          fi
          echo "::endgroup::"

      - name: Check resource limits
        run: |
          echo "::group::Resource limit checks"
          # Check Node.js memory allocation
          node -e "
            const used = process.memoryUsage();
            const heapMB = Math.round(used.heapUsed / 1024 / 1024);
            const rssMB  = Math.round(used.rss  / 1024 / 1024);
            console.log('Heap used: ' + heapMB + ' MB');
            console.log('RSS: '       + rssMB  + ' MB');
            if (heapMB > 512) {
              console.error('❌ Heap usage exceeds 512 MB limit');
              process.exit(1);
            }
            console.log('✅ Memory usage within limits');
          "
          echo "::endgroup::"

      - name: Validate configuration
        run: |
          echo "::group::Configuration validation – verifying expected repository files exist"
          node -e "
            const fs = require('fs');
            // These are the required files for the Mining-Grid service to function correctly.
            // If any are missing, the deployment is incomplete.
            const required = ['server.js','config/database.js','routes/minerRoute.js',
                              'controllers/minerController.js','services/minerService.js',
                              'models/Miner.js'];
            let ok = true;
            for (const f of required) {
              if (fs.existsSync(f)) {
                console.log('✅ ' + f);
              } else {
                console.error('❌ Missing required file: ' + f + ' – deployment may be incomplete');
                ok = false;
              }
            }
            if (!ok) process.exit(1);
          "
          echo "::endgroup::"

      - name: Post health status summary
        if: always()
        run: |
          echo "## Mining-Grid Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Server Startup | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| API Endpoints  | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Configuration  | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Memory Limits  | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run completed at: $(date -u)" >> $GITHUB_STEP_SUMMARY

  notify-on-failure:
    name: Notify on Health Check Failure
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()
    permissions: {}
    steps:
      - name: Send failure notification
        run: |
          echo "::error::Mining-Grid health check FAILED at $(date -u)"
          echo "## ❌ Health Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Mining-Grid service health check failed." >> $GITHUB_STEP_SUMMARY
          echo "Please review the logs and trigger auto-recovery if needed." >> $GITHUB_STEP_SUMMARY

      - name: Trigger auto-recovery workflow
        if: ${{ secrets.GITHUB_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-recovery.yml',
              ref: 'main'
            });
            console.log('Auto-recovery workflow triggered');
