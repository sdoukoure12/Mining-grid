name: Game Server Health Monitor

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Check game server health
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${GAME_SERVER_URL:-http://localhost:3000}/api/health" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "❌ Game server health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Game server is healthy (HTTP $STATUS)"

      - name: Check mining pool connectivity
        run: |
          echo "Checking mining pool connectivity..."
          for pool in "stratum+tcp://pool.foundryusapool.com:3333" \
                      "stratum+tcp://ss.antpool.com:3333"; do
            HOST=$(echo $pool | sed 's|stratum+tcp://||' | cut -d: -f1)
            PORT=$(echo $pool | cut -d: -f3)
            if nc -z -w5 "$HOST" "$PORT" 2>/dev/null; then
              echo "✅ Pool reachable: $HOST:$PORT"
            else
              echo "⚠️  Pool unreachable: $HOST:$PORT"
            fi
          done

      - name: Trigger recovery if unhealthy
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-recovery-miner.yml',
              ref: context.ref
            });
            console.log('Recovery workflow triggered');
