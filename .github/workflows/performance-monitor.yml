name: Performance Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  performance-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run performance checks
        id: perf
        run: |
          chmod +x scripts/performance-check.sh
          bash scripts/performance-check.sh

      - name: Fetch mining stats
        id: stats
        run: |
          STATS=$(curl -s "${GAME_SERVER_URL:-http://localhost:3000}/api/stats" || echo '{}')
          echo "stats=$STATS" >> $GITHUB_OUTPUT
          echo "Mining stats: $STATS"

      - name: Evaluate hash rate thresholds
        run: |
          STATS='${{ steps.stats.outputs.stats }}'
          node -e "
            const stats = JSON.parse(process.env.STATS || '{}');
            const totalHashrate = stats.totalHashrate || 0;
            const activeMiners = stats.activeMiners || 0;

            console.log('📊 Performance Report');
            console.log('Total hashrate:', totalHashrate, 'TH/s');
            console.log('Active miners:', activeMiners);

            if (totalHashrate < 100 && activeMiners > 0) {
              console.warn('⚠️  Hashrate below threshold (100 TH/s)');
              process.exit(1);
            }
            console.log('✅ Performance within acceptable limits');
          " STATS="$STATS" || true

      - name: Generate performance report
        run: |
          echo "## 📊 Performance Report - $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Checked |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY
