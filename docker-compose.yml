services:
  mining-grid:
    build:
      context: .
      dockerfile: Dockerfile
    image: mining-grid:latest
    container_name: mining-grid
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/mining_grid
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "0.8"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mining-net
    volumes:
      - logs:/var/log/mining-grid

  mongo:
    image: mongo:6
    container_name: mining-grid-mongo
    restart: always
    environment:
      MONGO_INITDB_DATABASE: mining_grid
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand({ping:1})", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - mining-net
    volumes:
      - mongo-data:/data/db

networks:
  mining-net:
    driver: bridge

volumes:
  mongo-data:
  logs:
